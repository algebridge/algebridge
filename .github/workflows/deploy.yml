name: Deploy to Vercel (production)

# Reliable deploy path that bypasses Vercel's native GitHub auto-deploy
# (which stopped triggering for this project). Runs on every push to main,
# and can also be triggered manually from the Actions tab ("Run workflow").
#
# ONE-TIME SETUP — add these in GitHub → repo Settings → Secrets and variables
# → Actions → "New repository secret":
#   VERCEL_TOKEN       -> Vercel → Account Settings → Tokens → Create Token
#   VERCEL_ORG_ID      -> from `.vercel/project.json` after `vercel link`,
#                          or Vercel → Team/Account Settings → General ("Team ID")
#   VERCEL_PROJECT_ID  -> Vercel → the project → Settings → General ("Project ID")
# Then push (or hit "Run workflow"). Nothing else changes.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vercel-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - name: Build
        run: vercel build --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
